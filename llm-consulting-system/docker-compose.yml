services:
  auth_service:
    build:
      context: ./auth_service
    container_name: auth_service
    working_dir: /app
    command: /app/.venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - ./auth_service/.env
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - rabbitmq

  bot_api:
    build:
      context: ./bot_service
    container_name: bot_api
    working_dir: /app
    command: /app/.venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8001
    env_file:
      - ./bot_service/.env
    ports:
      - "8001:8001"
    depends_on:
      - redis
      - rabbitmq

  bot_worker:
    build:
      context: ./bot_service
    container_name: bot_worker
    working_dir: /app
    command: /app/.venv/bin/celery -A app.infra.celery_app:celery_app worker --loglevel=info
    env_file:
      - ./bot_service/.env
    depends_on:
      - redis
      - rabbitmq

  telegram_bot:
    build:
      context: ./bot_service
    container_name: telegram_bot
    working_dir: /app
    command: /app/.venv/bin/python run_bot.py
    env_file:
      - ./bot_service/.env
    depends_on:
      - redis
      - rabbitmq

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"